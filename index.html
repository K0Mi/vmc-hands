<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VMC Hands</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 20px;
    }
    
    h1 { margin-bottom: 20px; color: #4ade80; }
    h2 { margin: 20px 0 10px; color: #60a5fa; font-size: 14px; text-transform: uppercase; }
    h3 { margin: 10px 0 5px; color: #f472b6; font-size: 12px; }
    
    .main-panel {
      background: #16213e;
      border-radius: 12px;
      padding: 20px;
    }
    
    .controls-panel {
      background: #16213e;
      border-radius: 12px;
      padding: 20px;
      max-height: calc(100vh - 40px);
      overflow-y: auto;
    }
    
    .video-container {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    
    #webcam, #canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    
    #webcam { transform: scaleX(-1); }
    #canvas { pointer-events: none; }
    
    .status {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ef4444;
    }
    
    .status-dot.connected { background: #4ade80; }
    
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    
    .btn-primary { background: #4ade80; color: #000; }
    .btn-primary:hover { background: #22c55e; }
    .btn-secondary { background: #334155; color: #fff; }
    .btn-secondary:hover { background: #475569; }
    .btn.active { background: #f472b6; }
    
    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    
    .hand-controls {
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
    }
    
    .finger-group {
      margin-bottom: 10px;
    }
    
    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 5px 0;
    }
    
    .slider-row label {
      width: 30px;
      font-size: 11px;
      color: #888;
    }
    
    .slider-row input[type="range"] {
      flex: 1;
      height: 6px;
      -webkit-appearance: none;
      background: #334155;
      border-radius: 3px;
      outline: none;
    }
    
    .slider-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: #4ade80;
      border-radius: 50%;
      cursor: pointer;
    }
    
    .slider-row .value {
      width: 40px;
      font-size: 11px;
      color: #888;
      text-align: right;
    }
    
    .mode-toggle {
      display: flex;
      gap: 5px;
      margin-bottom: 15px;
    }
    
    .mode-toggle .btn {
      flex: 1;
      padding: 8px;
      font-size: 12px;
    }
    
    .settings-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 0;
    }
    
    .settings-row label {
      flex: 1;
      font-size: 12px;
    }
    
    .settings-row input[type="number"] {
      width: 60px;
      padding: 5px;
      background: #334155;
      border: none;
      border-radius: 4px;
      color: #fff;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="main-panel">
      <h1>🤚 VMC Hands</h1>
      
      <div class="video-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
      </div>
      
      <div class="status">
        <div id="bridge-status" class="status-dot"></div>
        <span id="bridge-text">Bridge: Disconnected</span>
      </div>
      
      <div class="btn-row">
        <button id="btn-camera" class="btn btn-primary">📷 Start Camera</button>
        <button id="btn-connect" class="btn btn-secondary">🔌 Connect Bridge</button>
        <button id="btn-reset" class="btn btn-secondary">↺ Reset Pose</button>
      </div>
    </div>
    
    <div class="controls-panel">
      <div class="mode-toggle">
        <button id="mode-track" class="btn btn-secondary active">🎥 Track</button>
        <button id="mode-pose" class="btn btn-secondary">🎛️ Pose</button>
      </div>
      
      <!-- Right Hand -->
      <div class="hand-controls" id="right-hand-controls">
        <h2>Right Hand</h2>
        
        <div class="finger-group">
          <h3>Thumb</h3>
          <div class="slider-row">
            <label>Prox</label>
            <input type="range" data-hand="right" data-finger="Thumb" data-joint="0" min="-90" max="90" value="0">
            <span class="value">0°</span>
          </div>
          <div class="slider-row">
            <label>Int</label>
            <input type="range" data-hand="right" data-finger="Thumb" data-joint="1" min="-90" max="90" value="0">
            <span class="value">0°</span>
          </div>
          <div class="slider-row">
            <label>Dist</label>
            <input type="range" data-hand="right" data-finger="Thumb" data-joint="2" min="-90" max="90" value="0">
            <span class="value">0°</span>
          </div>
          <div class="slider-row">
            <label>Spr</label>
            <input type="range" data-hand="right" data-finger="Thumb" data-joint="spread" min="-45" max="45" value="0">
            <span class="value">0°</span>
          </div>
        </div>
        
        <div class="finger-group">
          <h3>Index</h3>
          <div class="slider-row"><label>Prox</label><input type="range" data-hand="right" data-finger="Index" data-joint="0" min="-20" max="90" value="0"><span class="value">0°</span></div>
          <div class="slider-row"><label>Int</label><input type="range" data-hand="right" data-finger="Index" data-joint="1" min="0" max="120" value="0"><span class="value">0°</span></div>
          <div class="slider-row"><label>Dist</label><input type="range" data-hand="right" data-finger="Index" data-joint="2" min="0" max="90" value="0"><span class="value">0°</span></div>
        </div>
        
        <div class="finger-group">
          <h3>Middle</h3>
          <div class="slider-row"><label>Prox</label><input type="range" data-hand="right" data-finger="Middle" data-joint="0" min="-20" max="90" value="0"><span class="value">0°</span></div>
          <div class="slider-row"><label>Int</label><input type="range" data-hand="right" data-finger="Middle" data-joint="1" min="0" max="120" value="0"><span class="value">0°</span></div>
          <div class="slider-row"><label>Dist</label><input type="range" data-hand="right" data-finger="Middle" data-joint="2" min="0" max="90" value="0"><span class="value">0°</span></div>
        </div>
        
        <div class="finger-group">
          <h3>Ring</h3>
          <div class="slider-row"><label>Prox</label><input type="range" data-hand="right" data-finger="Ring" data-joint="0" min="-20" max="90" value="0"><span class="value">0°</span></div>
          <div class="slider-row"><label>Int</label><input type="range" data-hand="right" data-finger="Ring" data-joint="1" min="0" max="120" value="0"><span class="value">0°</span></div>
          <div class="slider-row"><label>Dist</label><input type="range" data-hand="right" data-finger="Ring" data-joint="2" min="0" max="90" value="0"><span class="value">0°</span></div>
        </div>
        
        <div class="finger-group">
          <h3>Little</h3>
          <div class="slider-row"><label>Prox</label><input type="range" data-hand="right" data-finger="Little" data-joint="0" min="-20" max="90" value="0"><span class="value">0°</span></div>
          <div class="slider-row"><label>Int</label><input type="range" data-hand="right" data-finger="Little" data-joint="1" min="0" max="120" value="0"><span class="value">0°</span></div>
          <div class="slider-row"><label>Dist</label><input type="range" data-hand="right" data-finger="Little" data-joint="2" min="0" max="90" value="0"><span class="value">0°</span></div>
        </div>
      </div>
      
      <!-- Left Hand -->
      <div class="hand-controls" id="left-hand-controls">
        <h2>Left Hand</h2>
        
        <div class="finger-group">
          <h3>Thumb</h3>
          <div class="slider-row">
            <label>Prox</label>
            <input type="range" data-hand="left" data-finger="Thumb" data-joint="0" min="-90" max="90" value="0">
            <span class="value">0°</span>
          </div>
          <div class="slider-row">
            <label>Int</label>
            <input type="range" data-hand="left" data-finger="Thumb" data-joint="1" min="-90" max="90" value="0">
            <span class="value">0°</span>
          </div>
          <div class="slider-row">
            <label>Dist</label>
            <input type="range" data-hand="left" data-finger="Thumb" data-joint="2" min="-90" max="90" value="0">
            <span class="value">0°</span>
          </div>
          <div class="slider-row">
            <label>Spr</label>
            <input type="range" data-hand="left" data-finger="Thumb" data-joint="spread" min="-45" max="45" value="0">
            <span class="value">0°</span>
          </div>
        </div>
        
        <div class="finger-group">
          <h3>Index</h3>
          <div class="slider-row"><label>Prox</label><input type="range" data-hand="left" data-finger="Index" data-joint="0" min="-20" max="90" value="0"><span class="value">0°</span></div>
          <div class="slider-row"><label>Int</label><input type="range" data-hand="left" data-finger="Index" data-joint="1" min="0" max="120" value="0"><span class="value">0°</span></div>
          <div class="slider-row"><label>Dist</label><input type="range" data-hand="left" data-finger="Index" data-joint="2" min="0" max="90" value="0"><span class="value">0°</span></div>
        </div>
        
        <div class="finger-group">
          <h3>Middle</h3>
          <div class="slider-row"><label>Prox</label><input type="range" data-hand="left" data-finger="Middle" data-joint="0" min="-20" max="90" value="0"><span class="value">0°</span></div>
          <div class="slider-row"><label>Int</label><input type="range" data-hand="left" data-finger="Middle" data-joint="1" min="0" max="120" value="0"><span class="value">0°</span></div>
          <div class="slider-row"><label>Dist</label><input type="range" data-hand="left" data-finger="Middle" data-joint="2" min="0" max="90" value="0"><span class="value">0°</span></div>
        </div>
        
        <div class="finger-group">
          <h3>Ring</h3>
          <div class="slider-row"><label>Prox</label><input type="range" data-hand="left" data-finger="Ring" data-joint="0" min="-20" max="90" value="0"><span class="value">0°</span></div>
          <div class="slider-row"><label>Int</label><input type="range" data-hand="left" data-finger="Ring" data-joint="1" min="0" max="120" value="0"><span class="value">0°</span></div>
          <div class="slider-row"><label>Dist</label><input type="range" data-hand="left" data-finger="Ring" data-joint="2" min="0" max="90" value="0"><span class="value">0°</span></div>
        </div>
        
        <div class="finger-group">
          <h3>Little</h3>
          <div class="slider-row"><label>Prox</label><input type="range" data-hand="left" data-finger="Little" data-joint="0" min="-20" max="90" value="0"><span class="value">0°</span></div>
          <div class="slider-row"><label>Int</label><input type="range" data-hand="left" data-finger="Little" data-joint="1" min="0" max="120" value="0"><span class="value">0°</span></div>
          <div class="slider-row"><label>Dist</label><input type="range" data-hand="left" data-finger="Little" data-joint="2" min="0" max="90" value="0"><span class="value">0°</span></div>
        </div>
      </div>
      
      <h2>Settings</h2>
      <div class="settings-row">
        <label>Curl Multiplier</label>
        <input type="number" id="curl-mult" value="0.75" step="0.05">
      </div>
      <div class="settings-row">
        <label>Thumb Multiplier</label>
        <input type="number" id="thumb-mult" value="0.75" step="0.05">
      </div>
      <div class="settings-row">
        <label>Smoothing</label>
        <input type="number" id="smoothing" value="0.5" step="0.1" min="0" max="0.95">
      </div>
    </div>
  </div>
  
  <script type="module" src="/src/main.js"></script>
</body>
</html>
